apiVersion: batch/v1
kind: Job
metadata:
  name: test-mastodon-assets-upload
  labels:
    helm.sh/chart: mastodon-1.0.2
    app.kubernetes.io/name: mastodon
    app.kubernetes.io/instance: test
    app.kubernetes.io/version: "v4.6.0"
    app.kubernetes.io/managed-by: Helm
    joinmastodon.org/property: "mastodon.social"
    mastodon/server: "mastodon.social"
    tags.datadoghq.com/env: "production"
    
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    "helm.sh/hook-weight": "-1"
spec:
  template:
    metadata:
      name: test-mastodon-assets-upload
      annotations:
        
    spec:
      serviceAccountName: test-mastodon-predeploy
      securityContext:
        fsGroup: 991
        runAsGroup: 991
        runAsUser: 991
      restartPolicy: Never
      initContainers:
        - name: extract-assets
          image: "ghcr.io/mastodon/mastodon:v4.6.0"
          imagePullPolicy: IfNotPresent
          command:
          - cp
          args:
          - -rv
          - public
          - /assets
          volumeMounts:
            - mountPath: /assets
              name: assets
      containers:
        - name: upload-assets
          image: rclone/rclone:1
          imagePullPolicy: Always
          env:
          - name: RCLONE_S3_NO_CHECK_BUCKET
            value: "true"
          - name: RCLONE_S3_ACL
            value: public-read
          - name: RCLONE_CONFIG_REMOTE_TYPE
            value: s3
          - name: RCLONE_CONFIG_REMOTE_PROVIDER
            value: AWS
          - name: RCLONE_CONFIG_REMOTE_ENDPOINT
            value: sos-de-fra-1.exo.io
          - name: RCLONE_CONFIG_REMOTE_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: mastodon-social-s3-upload
                key: access-key-id
          - name: RCLONE_CONFIG_REMOTE_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: mastodon-social-s3-upload
                key: secret-access-key
          command:
          - rclone
          args:
          - copy
          - /assets/public
          - "remote:mastodon-social-assets"
          - --fast-list
          - --transfers=32
          - --include
          - "{assets,packs}/**"
          - --progress
          - -vv
          volumeMounts:
            - mountPath: /assets
              name: assets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 500Mi
      volumes:
        - name: assets
          emptyDir: {}
      nodeSelector:
        joinmastodon.org/property: mastodon.social
